<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishi_kaar Auth | Next-Gen Agriculture</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0f172a;
            --accent-emerald: #10b981;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-glass: rgba(255, 255, 255, 0.1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .bg-mesh {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(16, 185, 129, 0.1) 0%, transparent 50%);
            z-index: -1;
        }
        .auth-card {
            background: rgba(30, 41, 59, 0.7);
            padding: 2.5rem;
            border-radius: 24px;
            border: 1px solid var(--border-glass);
            backdrop-filter: blur(20px);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .header { text-align: center; margin-bottom: 2rem; }
        .header i { font-size: 3rem; color: var(--accent-emerald); margin-bottom: 1rem; }
        .header h1 { font-size: 1.5rem; letter-spacing: -1px; }
        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; background: rgba(0,0,0,0.2); padding: 0.4rem; border-radius: 12px; }
        .tab-btn {
            flex: 1; padding: 0.8rem; border: none; background: transparent;
            color: var(--text-secondary); cursor: pointer; border-radius: 8px;
            font-weight: 600; transition: 0.3s;
        }
        .tab-btn.active { background: var(--accent-emerald); color: white; }
        form { display: flex; flex-direction: column; gap: 1.2rem; }
        .input-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .input-group label { font-size: 0.85rem; color: var(--text-secondary); }
        .input-group input, .input-group select {
            padding: 0.9rem; border-radius: 12px; border: 1px solid var(--border-glass);
            background: rgba(255,255,255,0.05); color: #fff; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--accent-emerald); }
        .btn-auth {
            padding: 1rem; border-radius: 12px; border: none;
            background: var(--accent-emerald); color: white; font-weight: 700;
            cursor: pointer; margin-top: 1rem; transition: 0.3s;
        }
        .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }
        .error-msg { color: #f43f5e; font-size: 0.85rem; text-align: center; display: none; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="auth-card">
        <div class="header">
            <i class="fas fa-leaf"></i>
            <h1>Krishi_kaar</h1>
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.5rem;">SaaS Smart Agriculture</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">LOGIN</button>
            <button class="tab-btn" onclick="switchTab('signup')">SIGN UP</button>
        </div>

        <div id="error" class="error-msg">Invalid credentials. Please try again.</div>

        <form id="auth-form" action="/login" method="POST">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="farmer@krishi.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            
            <div id="signup-fields" style="display: none; flex-direction: column; gap: 1.2rem;">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="John Doe">
                </div>
                <div class="input-group">
                    <label>Farming Experience</label>
                    <select name="experience">
                        <option value="Beginner">Beginner (0-2 yrs)</option>
                        <option value="Advanced">Advanced (2-5 yrs)</option>
                        <option value="Expert">Expert (5+ yrs)</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-auth" id="submit-btn">ACCESS DASHBOARD</button>
        </form>
    </div>

    <script>
        function switchTab(type) {
            const tabs = document.querySelectorAll('.tab-btn');
            const signupFields = document.getElementById('signup-fields');
            const submitBtn = document.getElementById('submit-btn');
            const form = document.getElementById('auth-form');

            tabs.forEach(t => t.classList.remove('active'));
            if (type === 'login') {
                tabs[0].classList.add('active');
                signupFields.style.display = 'none';
                submitBtn.innerText = 'ACCESS DASHBOARD';
                form.action = '/login';
            } else {
                tabs[1].classList.add('active');
                signupFields.style.display = 'flex';
                submitBtn.innerText = 'CREATE ACCOUNT';
                form.action = '/signup';
            }
        }

        // Handle error param if exists
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').innerText = urlParams.get('error');
        }
    </script>
</body>
</html>
