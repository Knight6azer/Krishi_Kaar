<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishi_kaar Auth | Next-Gen Agriculture</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0f172a;
            --accent-emerald: #10b981;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-glass: rgba(255, 255, 255, 0.1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .bg-mesh {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(16, 185, 129, 0.1) 0%, transparent 50%);
            z-index: -1;
        }
        .auth-card {
            background: rgba(30, 41, 59, 0.7);
            padding: 2.5rem;
            border-radius: 24px;
            border: 1px solid var(--border-glass);
            backdrop-filter: blur(20px);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .header { text-align: center; margin-bottom: 2rem; }
        .header i { font-size: 3rem; color: var(--accent-emerald); margin-bottom: 1rem; }
        .header h1 { font-size: 1.5rem; letter-spacing: -1px; }
        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; background: rgba(0,0,0,0.2); padding: 0.4rem; border-radius: 12px; }
        .tab-btn {
            flex: 1; padding: 0.8rem; border: none; background: transparent;
            color: var(--text-secondary); cursor: pointer; border-radius: 8px;
            font-weight: 600; transition: 0.3s;
        }
        .tab-btn.active { background: var(--accent-emerald); color: white; }
        form { display: flex; flex-direction: column; gap: 1.2rem; }
        .input-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .input-group label { font-size: 0.85rem; color: var(--text-secondary); }
        .input-group input, .input-group select {
            padding: 0.9rem; border-radius: 12px; border: 1px solid var(--border-glass);
            background: rgba(255,255,255,0.05); color: #fff; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--accent-emerald); }
        .btn-auth {
            padding: 1rem; border-radius: 12px; border: none;
            background: var(--accent-emerald); color: white; font-weight: 700;
            cursor: pointer; margin-top: 1rem; transition: 0.3s;
        }
        .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }
        .error-msg { color: #f43f5e; font-size: 0.85rem; text-align: center; display: none; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div style="position: absolute; top: 1rem; right: 1rem; z-index: 10;">
        <select id="lang-selector" onchange="changeLanguage(this.value)" style="padding: 0.5rem; background: rgba(30,41,59,0.8); color: white; border: 1px solid var(--border-glass); border-radius: 8px; outline: none;">
            <option value="en">English</option>
            <option value="hi">हिंदी (Hindi)</option>
            <option value="mr">मराठी (Marathi)</option>
            <option value="gu">ગુજરાતી (Gujarati)</option>
            <option value="ta">தமிழ் (Tamil)</option>
            <option value="te">తెలుగు (Telugu)</option>
            <option value="kn">ಕನ್ನಡ (Kannada)</option>
            <option value="ur">اردو (Urdu)</option>
        </select>
    </div>
    <div class="bg-mesh"></div>
    <div class="auth-card">
        <div class="header">
            <i class="fas fa-leaf"></i>
            <h1>Krishi_kaar</h1>
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.5rem;" data-i18n="saas_subtitle">SaaS Smart Agriculture</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')" data-i18n="login">LOGIN</button>
            <button class="tab-btn" onclick="switchTab('signup')" data-i18n="signup">SIGN UP</button>
        </div>

        <div id="error" class="error-msg" data-i18n="err_invalid">Invalid credentials. Please try again.</div>
        <div id="success" style="color: var(--accent-emerald); font-size: 0.85rem; text-align: center; display: none; margin-bottom: 1rem;" data-i18n="succ_created">Account created! Please login.</div>

        <form id="auth-form" action="/login" method="POST">
            <div class="input-group">
                <label data-i18n="lbl_email">Email Address</label>
                <input type="email" name="email" required placeholder="farmer@krishi.com" id="in_email">
            </div>
            <div class="input-group">
                <label data-i18n="lbl_pass">Password</label>
                <input type="password" name="password" required placeholder="••••••••" id="in_pass">
            </div>
            
            <div id="signup-fields" style="display: none; flex-direction: column; gap: 1.2rem;">
                <div class="input-group">
                    <label data-i18n="lbl_name">Full Name</label>
                    <input type="text" name="name" placeholder="John Doe" id="in_name">
                </div>
                <div class="input-group">
                    <label data-i18n="lbl_exp">Farming Experience</label>
                    <select name="experience">
                        <option value="Beginner" data-i18n="badge_beginner">Beginner (0-2 yrs)</option>
                        <option value="Advanced" data-i18n="badge_advanced">Advanced (2-5 yrs)</option>
                        <option value="Expert" data-i18n="badge_expert">Expert (5+ yrs)</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-auth" id="submit-btn" data-i18n="btn_login">ACCESS DASHBOARD</button>
        </form>
    </div>

    <script>
        let tData = {};

        async function changeLanguage(lang) {
            const res = await fetch(`/api/translations/${lang}`);
            tData = await res.json();
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (tData[key]) el.innerText = tData[key];
            });
            localStorage.setItem('krishi_lang', lang);
        }

        const savedLang = localStorage.getItem('krishi_lang');
        if (savedLang && savedLang !== 'en') {
            document.getElementById('lang-selector').value = savedLang;
            changeLanguage(savedLang);
        }

        function switchTab(type) {
            const tabs = document.querySelectorAll('.tab-btn');
            const signupFields = document.getElementById('signup-fields');
            const submitBtn = document.getElementById('submit-btn');
            const form = document.getElementById('auth-form');

            tabs.forEach(t => t.classList.remove('active'));
            if (type === 'login') {
                tabs[0].classList.add('active');
                signupFields.style.display = 'none';
                submitBtn.setAttribute('data-i18n', 'btn_login');
                submitBtn.innerText = tData['btn_login'] || 'ACCESS DASHBOARD';
                form.action = '/login';
            } else {
                tabs[1].classList.add('active');
                signupFields.style.display = 'flex';
                submitBtn.setAttribute('data-i18n', 'btn_signup');
                submitBtn.innerText = tData['btn_signup'] || 'CREATE ACCOUNT';
                form.action = '/signup';
            }
        }

        // Handle error and success params if exists
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').setAttribute('data-i18n', 'err_invalid');
        } else if (urlParams.has('success')) {
            document.getElementById('success').style.display = 'block';
            document.getElementById('success').setAttribute('data-i18n', 'succ_created');
            switchTab('login');
        }
    </script>
</body>
</html>
